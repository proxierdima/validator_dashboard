{% extends "base.html" %}

{% block content %}

<div class="panel">

<div class="panel-title">Active Governance Proposals</div>

<table>

<thead>
<tr>
<th>Network</th>
<th>ID</th>
<th>Title</th>
<th>Status</th>
<th>Voting ends</th>
</tr>
</thead>

<tbody>

{% for r in rows %}

<tr>
<td>{{ r.network }}</td>
<td>#{{ r.proposal_id }}</td>
<td>{{ r.title }}</td>
<td>{{ r.status }}</td>
<td>{{ r.voting_end_time }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
